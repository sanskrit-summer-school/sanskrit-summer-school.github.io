    <!-- Hero -->
    <header id="home">
        <div class="header-container">
            <div class="organizers-top">
                {{ hero.organizers.main }} <br>
                <span style="color: white; font-size: 0.85rem; font-weight: normal;">{{ hero.organizers.association }}</span> <br>
                {{ hero.organizers.partner }}
            </div>
            <div style="display: flex; justify-content: center; align-items: center; gap: 2rem; flex-wrap: wrap; margin-bottom: 1.5rem;">
                <img src="images/mahe_logo.svg" alt="MAHE Logo" style="height: 100px; width: auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
                <h1 style="margin-bottom: 0;">{{ hero.title_top }} <br><span style="color: #fbd38d;">{{ hero.title_highlight }}</span></h1>
                <img src="images/iitkgp_logo.svg" alt="IIT Kharagpur Logo" style="height: 100px; width: auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
            </div>
            <div class="event-date">{{ hero.dates }}</div>
        </div>
    </header>
